    function uid(){ const key=`photo_event_uid_${EVENT_ID}`; let id=localStorage.getItem(key); if(!id){ id="u_"+Math.random().toString(36).slice(2,10); localStorage.setItem(key,id);} return id; }
    function displayName(){ const key=`photo_event_name_${EVENT_ID}`; let name=localStorage.getItem(key); if(!name){ name="Guest-"+Math.random().toString(36).slice(2,5).toUpperCase(); localStorage.setItem(key,name);} return name; }
    function sortQueue(queueObj){ return Object.values(queueObj || {}).sort((a,b)=>{ const aPin=a.pinned?0:1, bPin=b.pinned?0:1; if(aPin!==bPin) return aPin-bPin; const aActive=a.active?0:1, bActive=b.active?0:1; if(aActive!==bActive) return aActive-bActive; const av=-(a.voteCount||0), bv=-(b.voteCount||0); if(av!==bv) return av-bv; return (a.createdAt||0)-(b.createdAt||0); }); }
    function currentPhoto(data){ const map=data?.currentMap || 'bridge'; const queue=sortQueue(data?.queue || {}).filter(v=>!v.finished && v.map===map); return queue.find(v=>v.active) || queue[0] || null; }
    function myCurrentQueueId(data){ const queue=Object.values(data?.queue || {}); return queue.find(v=>v.leaderId===state.user?.id && !v.finished)?.id || null; }
    function canManage(item){ return isAdmin() || item.leaderId === state.user?.id; }
    function formatRemain(ms){ const safe=Math.max(0,ms); const m=Math.floor(safe/60000); const s=Math.floor((safe%60000)/1000); return `${m}:${String(s).padStart(2,'0')}`; }
    function nextMapId(current){ const idx=MAP_ORDER.indexOf(current); return MAP_ORDER[(idx+1)%MAP_ORDER.length]; }
    function setBodyPhase(flow){ document.body.classList.remove('phase-brainstorm','phase-vote','phase-shoot','phase-break'); document.body.classList.add(`phase-${flow||'brainstorm'}`); }

    async function ensureSeed(){
      const snap=await get(eventRef()); if(snap.exists()) return;
      const now=Date.now();
      await set(eventRef(), { currentFlow:'brainstorm', currentMap:'bridge', currentPhotoId:'seed_1', phaseStartedAt:now, phaseEndsAt:0, queue:{ seed_1:{ id:'seed_1', title:'歩道橋・集合写真', map:'bridge', type:'sample', leaderId:'system', leaderName:'SYSTEM', active:true, finished:false, pinned:false, createdAt:now, voteCount:0, votedBy:{}, image:SAMPLE_PHOTOS[0].image, template:{ camera:'目線', mood:'わちゃ', size:'4〜5', plusOne:'後ろで小さく入る' }, participants:{} }, seed_2:{ id:'seed_2', title:'3スポット・エモ並び', map:'spots', type:'sample', leaderId:'system', leaderName:'SYSTEM', active:false, finished:false, pinned:false, createdAt:now+1, voteCount:0, votedBy:{}, image:SAMPLE_PHOTOS[1].image, template:{ camera:'低め', mood:'エモ', size:'2〜3', plusOne:'前に座る' }, participants:{} }, seed_3:{ id:'seed_3', title:'プール・俯瞰で広め', map:'pool', type:'sample', leaderId:'system', leaderName:'SYSTEM', active:false, finished:false, pinned:false, createdAt:now+2, voteCount:0, votedBy:{}, image:SAMPLE_PHOTOS[2].image, template:{ camera:'俯瞰', mood:'かっこよく', size:'何人でも', plusOne:'後ろで小さく入る' }, participants:{} } }, people:{} });
    }
    async function ensureUser(){ const id=uid(); state.user={ id, name:displayName() }; state.myStatus=localStorage.getItem(`photo_event_status_${EVENT_ID}`)||'chill'; els.nameInput.value=state.user.name; await update(eventRef(`/people/${id}`), { name:state.user.name, status:state.myStatus, updatedAt:Date.now() }); }

    function renderFlow(data){ const current=data?.currentFlow || 'brainstorm'; setBodyPhase(current); const index=FLOW.findIndex(v=>v.id===current); els.flowLine.innerHTML=''; FLOW.forEach((step,i)=>{ const item=node('div','flow-step'); if(i<index) item.classList.add('done'); if(i===index) item.classList.add('active'); item.innerHTML=`<div class="flow-mini">${esc(mapName(data?.currentMap || 'bridge'))}</div><div class="flow-name">${esc(step.name)}</div><div class="flow-sub">${esc(step.time)}</div>`; els.flowLine.appendChild(item); }); }
    function renderCurrent(data){ const photo=currentPhoto(data); const flow=data?.currentFlow==='break' ? BREAK_FLOW : (FLOW.find(v=>v.id===data?.currentFlow) || FLOW[0]); const title=photo?.title || flow.name; const map=mapName(data?.currentMap || 'bridge'); const remain=(data?.phaseEndsAt || 0)-Date.now(); els.currentTitle.textContent=title; els.currentMeta.innerHTML=[`現状：${flow.name}`,`マップ：${map}`,`残り：${data?.currentFlow==='break' ? formatRemain(remain) : '手動'}`,`運営：${isAdmin() ? 'ON' : 'OFF'}`].map(v=>`<span class="meta-pill">${esc(v)}</span>`).join(''); els.eventMini.textContent=`event=${EVENT_ID}`; els.detailBody.innerHTML=photo ? `<div class="photo-card current"><div class="card-head"><div><div class="card-title">${esc(photo.title)}</div><div class="card-sub">${esc(flow.name)} ・ ${esc(mapName(photo.map))}</div></div><div class="kind">${photo.type === 'sample' ? '選択' : 'オリジナル'}</div></div>${photo.image ? `<div class="thumb" style="height:180px;background-image:url('${esc(photo.image)}')"></div>` : ``}<div class="chips"><span class="chip">${esc(photo.template?.camera || '指定なし')}</span><span class="chip">${esc(photo.template?.mood || '指定なし')}</span><span class="chip">${esc(photo.template?.size || '指定なし')}</span><span class="chip">❤️ ${Number(photo.voteCount || 0)}</span></div></div>` : `<div class="empty">なし</div>`; }

    function renderForced(data){ const map=data?.currentMap || 'bridge'; const forced=sortQueue(data?.queue || {}).filter(v=>!v.finished && v.map===map && v.pinned); els.forcedWrap.style.display = forced.length ? 'block':'none'; els.forcedList.innerHTML=''; forced.forEach(item=>{ const card=node('div','photo-card pick-card'); card.innerHTML=`<div class="card-head"><div><div class="card-title">${esc(item.title)}</div><div class="card-sub">強制上表示 ・ ${esc(item.leaderName || 'Guest')}</div></div><div class="kind">固定</div></div>`; els.forcedList.appendChild(card); }); }

    function renderQueue(data){ const map=data?.currentMap || 'bridge'; const flow=data?.currentFlow || 'brainstorm'; const queue=sortQueue(data?.queue || {}).filter(v=>!v.finished && v.map===map && !v.pinned); els.queueList.innerHTML=''; if(!queue.length){ els.queueList.innerHTML=`<div class="empty">まだありません</div>`; } else { queue.forEach((item,index)=>{ const joined=!!item.participants?.[state.user.id]; const voted=!!item.votedBy?.[state.user.id]; const card=node('div',`photo-card ${item.active ? 'current':''} ${flow==='vote' ? 'vote-card':''}`); card.innerHTML=`<div class="card-head"><div><div class="card-title">${esc(item.title)}</div><div class="card-sub">${index===0 ? '上から順に表示' : '一覧'} ・ ${esc(mapName(item.map))} ・ ${esc(item.leaderName || 'Guest')}</div></div><div class="kind">${item.type === 'sample' ? '選択' : 'オリジナル'}</div></div>${item.image ? `<div class="thumb" style="background-image:url('${esc(item.image)}')"></div>` : ``}<div class="chips"><span class="chip">${esc(item.template?.camera || '指定なし')}</span><span class="chip">${esc(item.template?.mood || '指定なし')}</span><span class="chip">${esc(item.template?.size || '指定なし')}</span><span class="chip">❤️ ${Number(item.voteCount || 0)}</span></div><div class="actions"><button class="btn ${joined ? '' : 'primary'}" data-join="${item.id}">${joined ? '参加中' : '参加する'}</button>${flow==='vote' ? `<button class="btn push" data-vote="${item.id}">${voted ? '推し済み' : '推し'}</button>` : ``}${canManage(item) ? `<button class="btn danger" data-cancel="${item.id}">取り消し</button>` : ``}${canManage(item) && item.active ? `<button class="btn ok" data-done="${item.id}">撮れた！！</button>` : ``}${isAdmin() ? `<button class="btn warn" data-pin="${item.id}">${item.pinned ? '固定中' : '上に固定'}</button>` : ``}</div>`; els.queueList.appendChild(card); }); }
      const next=queue.filter(v=>!v.active).slice(0,3); els.nextList.innerHTML=next.length ? '' : `<div class="empty">なし</div>`; next.forEach(item=>{ const card=node('div','photo-card'); card.innerHTML=`<div class="card-title">${esc(item.title)}</div><div class="card-sub">${esc(mapName(item.map))} ・ ${esc(item.leaderName || 'Guest')} ・ ${Number(item.voteCount || 0)}推し</div>`; els.nextList.appendChild(card); }); }

    function renderVote(data){ const flow=data?.currentFlow || 'brainstorm'; const map=data?.currentMap || 'bridge'; const queue=sortQueue(data?.queue || {}).filter(v=>!v.finished && !v.active && v.map===map && !v.pinned); els.voteList.innerHTML=''; if(flow !== 'vote'){ els.voteList.innerHTML=`<div class="empty">投票タイムになると表示</div>`; return; } if(!queue.length){ els.voteList.innerHTML=`<div class="empty">候補がありません</div>`; return; } queue.forEach(item=>{ const voted=!!item.votedBy?.[state.user.id]; const card=node('div','photo-card vote-card'); card.innerHTML=`<div class="card-head"><div><div class="card-title">${esc(item.title)}</div><div class="card-sub">${esc(mapName(item.map))} ・ ${esc(item.leaderName || 'Guest')}</div></div><div class="vote-count">${Number(item.voteCount || 0)}</div></div>${item.image ? `<div class="thumb" style="background-image:url('${esc(item.image)}')"></div>` : ``}<div class="actions"><button class="btn push" data-vote="${item.id}">${voted ? '推し済み' : '推し'}</button></div>`; els.voteList.appendChild(card); }); }
    function renderPeople(data){ const people=Object.entries(data?.people || {}).map(([id,value])=>({id,...value})); people.sort((a,b)=>(a.name||'').localeCompare(b.name||'')); els.peopleList.innerHTML=people.length ? '' : `<div class="empty">まだいません</div>`; people.forEach(person=>{ const info=statusInfo(person.status); const item=node('div','person'); item.innerHTML=`<div class="person-icon">${info.icon}</div><div><div class="person-name">${esc(person.name || 'Guest')}${person.id===state.user?.id ? ' ・you' : ''}</div><div class="person-sub">${esc(info.label)}</div></div>`; els.peopleList.appendChild(item); }); }
    function renderGoals(){ els.goalList.innerHTML=`<div class="goal-card"><div class="goal-title">#私の推しフォト を作成・投稿が今日の目標</div><div class="goal-sub">推しフォトのSNS投稿は任意です。SNSに載せる場合は、他の人の名前が見える・特定できる写り込みは配慮してね。心配な方は 名前やアバター変更も推奨。</div></div>`; }
    function buildSamples(){ els.sampleList.innerHTML=''; SAMPLE_PHOTOS.forEach((sample,i)=>{ const item=node('div','sample'); item.innerHTML=`<div class="thumb" style="background-image:url('${esc(sample.image)}')"></div><div><div class="sample-title">${esc(sample.title)}</div><div class="sample-sub">${esc(mapName(sample.map))} ・ ${esc(sample.camera)} ・ ${esc(sample.mood)}</div></div><button class="btn primary" data-sample="${i}">入れる</button>`; els.sampleList.appendChild(item); }); }
    function buildMapOptions(){ els.mapSelect.innerHTML=MAPS.map(v=>`<option value="${v.id}">${esc(v.name)}</option>`).join(''); }
    function buildStatusChips(){ els.statusChips.innerHTML=''; STATUS_OPTIONS.forEach(opt=>{ const btn=node('button',`chip-btn ${state.myStatus===opt.id ? 'on':''}`); btn.type='button'; btn.dataset.status=opt.id; btn.textContent=`${opt.icon} ${opt.label}`; els.statusChips.appendChild(btn); }); }
    function buildTemplateChips(){ Object.entries(TEMPLATES).forEach(([group,list])=>{ const root=qs(`[data-group="${group}"]`); root.innerHTML=''; list.forEach(value=>{ const btn=node('button',`chip-btn ${state.pick[group]===value ? 'on':''}`); btn.type='button'; btn.dataset.group=group; btn.dataset.value=value; btn.textContent=value; root.appendChild(btn); }); }); }
    function setMode(mode){ state.mode=mode; els.typeSample.classList.toggle('on', mode==='sample'); els.typeOriginal.classList.toggle('on', mode==='original'); els.sampleArea.style.display=mode==='sample' ? 'block':'none'; els.originalArea.style.display=mode==='original' ? 'block':'none'; }

    async function joinPhoto(photoId){ await set(eventRef(`/queue/${photoId}/participants/${state.user.id}`), { name:state.user.name, at:Date.now() }); }
    async function votePhoto(photoId){ if((state.eventData?.currentFlow||'')!=='vote') return; await runTransaction(eventRef(`/queue/${photoId}`), item=>{ if(!item || item.finished) return item; item.votedBy ||= {}; item.voteCount ||= 0; if(item.votedBy[state.user.id]) return item; item.votedBy[state.user.id]=true; item.voteCount += 1; return item; }); }
    async function cancelPhoto(photoId){ const snap=await get(eventRef(`/queue/${photoId}`)); const data=snap.val(); if(!data || !canManage(data)) return; await remove(eventRef(`/queue/${photoId}`)); }
    async function finishCurrent(photoId){ const current=state.eventData?.queue?.[photoId]; if(!current || !canManage(current)) return; const updates={}; updates[`photoEvents/${EVENT_ID}/queue/${photoId}/active`]=false; updates[`photoEvents/${EVENT_ID}/queue/${photoId}/finished`]=true; updates[`photoEvents/${EVENT_ID}/currentFlow`]='break'; updates[`photoEvents/${EVENT_ID}/phaseStartedAt`]=Date.now(); updates[`photoEvents/${EVENT_ID}/phaseEndsAt`]=Date.now()+BREAK_FLOW.durationMs; await update(ref(db), updates); }
    async function pinPhoto(photoId){ if(!isAdmin()) return; await update(eventRef(`/queue/${photoId}`), { pinned:true }); }
    async function clearPins(){ if(!isAdmin()) return; const queue=state.eventData?.queue || {}; const updates={}; Object.keys(queue).forEach(id=>updates[`photoEvents/${EVENT_ID}/queue/${id}/pinned`]=false); await update(ref(db), updates); }
    async function setPhase(phaseId){ if(!isAdmin()) return; const updates={}; updates[`photoEvents/${EVENT_ID}/currentFlow`]=phaseId; updates[`photoEvents/${EVENT_ID}/phaseStartedAt`]=Date.now(); updates[`photoEvents/${EVENT_ID}/phaseEndsAt`]=phaseId==='break' ? Date.now()+BREAK_FLOW.durationMs : 0; if(phaseId==='shoot'){ const map=state.eventData?.currentMap || 'bridge'; const queue=sortQueue(state.eventData?.queue || {}).filter(v=>!v.finished && v.map===map); const chosen=queue[0]; if(chosen){ Object.values(state.eventData?.queue||{}).forEach(v=>{ updates[`photoEvents/${EVENT_ID}/queue/${v.id}/active`]=false; }); updates[`photoEvents/${EVENT_ID}/queue/${chosen.id}/active`]=true; updates[`photoEvents/${EVENT_ID}/currentPhotoId`]=chosen.id; } } await update(ref(db), updates); }
    async function setMap(mapId){ if(!isAdmin()) return; const updates={}; updates[`photoEvents/${EVENT_ID}/currentMap`]=mapId; updates[`photoEvents/${EVENT_ID}/currentFlow`]='brainstorm'; updates[`photoEvents/${EVENT_ID}/phaseStartedAt`]=Date.now(); updates[`photoEvents/${EVENT_ID}/phaseEndsAt`]=0; Object.values(state.eventData?.queue || {}).forEach(v=>{ updates[`photoEvents/${EVENT_ID}/queue/${v.id}/active`]=false; }); const queue=sortQueue(state.eventData?.queue || {}).filter(v=>!v.finished && v.map===mapId); if(queue[0]){ updates[`photoEvents/${EVENT_ID}/queue/${queue[0].id}/active`]=true; updates[`photoEvents/${EVENT_ID}/currentPhotoId`]=queue[0].id; } await update(ref(db), updates); }
    async function nextCycle(){ if(!isAdmin()) return; await setMap(nextMapId(state.eventData?.currentMap || 'bridge')); }
    async function addSample(index){ const sample=SAMPLE_PHOTOS[index]; if(!sample || myCurrentQueueId(state.eventData)) return; const newRef=push(eventRef('/queue')); await set(newRef,{ id:newRef.key,title:sample.title,map:sample.map,type:'sample',leaderId:state.user.id,leaderName:state.user.name,active:false,finished:false,pinned:false,participants:{},createdAt:Date.now(),createdAtServer:serverTimestamp(),voteCount:0,votedBy:{},image:sample.image,template:{camera:sample.camera,mood:sample.mood,size:sample.size,plusOne:sample.plusOne} }); closeModal(els.leaderModal); }
    async function addOriginal(){ const title=els.titleInput.value.trim(); if(!title || myCurrentQueueId(state.eventData)) return; const detail=els.detailSelect.value==='yes'; const newRef=push(eventRef('/queue')); await set(newRef,{ id:newRef.key,title,map:els.mapSelect.value,type:'original',leaderId:state.user.id,leaderName:state.user.name,active:false,finished:false,pinned:false,participants:{},createdAt:Date.now(),createdAtServer:serverTimestamp(),voteCount:0,votedBy:{},image:'',template:detail ? {...state.pick}:{} }); els.titleInput.value=''; closeModal(els.leaderModal); }
    async function saveName(){ const name=els.nameInput.value.trim(); if(!name) return; localStorage.setItem(`photo_event_name_${EVENT_ID}`, name); state.user.name=name; await update(eventRef(`/people/${state.user.id}`), { name, updatedAt:Date.now() }); }
    async function saveStatus(){ localStorage.setItem(`photo_event_status_${EVENT_ID}`, state.myStatus); await update(eventRef(`/people/${state.user.id}`), { status:state.myStatus, updatedAt:Date.now() }); closeModal(els.statusModal); }
    async function autoAdvanceIfNeeded(){ const data=state.eventData; if(!data || !isAdmin() || data.currentFlow!=='break') return; if(Date.now() < (data.phaseEndsAt || 0)) return; await nextCycle(); }

    function bindEvents(){
      document.querySelectorAll('[data-close]').forEach(btn=>btn.addEventListener('click',()=>closeModal(document.getElementById(btn.dataset.close))));
      [els.detailModal,els.statusModal,els.leaderModal,els.adminModal].forEach(modal=>modal.addEventListener('click',e=>{ if(e.target===modal) closeModal(modal); }));
      els.detailBtn.addEventListener('click',()=>openModal(els.detailModal));
      els.joinBtn.addEventListener('click', async ()=>{ const current=currentPhoto(state.eventData); if(current) await joinPhoto(current.id); });
      els.statusFab.addEventListener('click',()=>{ els.nameInput.value=state.user?.name || displayName(); buildStatusChips(); openModal(els.statusModal); });
      els.saveNameBtn.addEventListener('click', saveName); els.saveStatusBtn.addEventListener('click', saveStatus); els.statusChips.addEventListener('click',e=>{ const btn=e.target.closest('[data-status]'); if(!btn) return; state.myStatus=btn.dataset.status; buildStatusChips(); });
      els.leaderFab.addEventListener('click',()=>openModal(els.leaderModal)); els.typeSample.addEventListener('click',()=>setMode('sample')); els.typeOriginal.addEventListener('click',()=>setMode('original')); els.detailSelect.addEventListener('change',()=>{ els.templateArea.style.display=els.detailSelect.value==='yes' ? 'grid':'none'; }); els.addOriginalBtn.addEventListener('click', addOriginal); els.sampleList.addEventListener('click',e=>{ const btn=e.target.closest('[data-sample]'); if(btn) addSample(Number(btn.dataset.sample)); }); els.templateArea.addEventListener('click',e=>{ const btn=e.target.closest('[data-group]'); if(!btn) return; state.pick[btn.dataset.group]=btn.dataset.value; buildTemplateChips(); });
      els.queueList.addEventListener('click', async e=>{ const join=e.target.closest('[data-join]'); if(join){ await joinPhoto(join.dataset.join); return; } const vote=e.target.closest('[data-vote]'); if(vote){ await votePhoto(vote.dataset.vote); return; } const done=e.target.closest('[data-done]'); if(done){ await finishCurrent(done.dataset.done); return; } const cancel=e.target.closest('[data-cancel]'); if(cancel){ await cancelPhoto(cancel.dataset.cancel); return; } const pin=e.target.closest('[data-pin]'); if(pin){ await pinPhoto(pin.dataset.pin); } });
      els.voteList.addEventListener('click', async e=>{ const vote=e.target.closest('[data-vote]'); if(vote) await votePhoto(vote.dataset.vote); });
      els.adminDot.addEventListener('click',()=>openModal(els.adminModal));
      els.unlockAdminBtn.addEventListener('click',()=>{ if(els.adminPassInput.value===ADMIN_PASSWORD){ state.adminUnlocked=true; els.adminBody.style.display='block'; els.adminPassInput.value=''; renderCurrent(state.eventData || {}); } });
      els.adminBody.addEventListener('click', async e=>{ const phase=e.target.closest('[data-admin-phase]'); if(phase){ await setPhase(phase.dataset.adminPhase); return; } const map=e.target.closest('[data-admin-map]'); if(map){ await setMap(map.dataset.adminMap); } });
      els.pinCurrentBtn.addEventListener('click', async ()=>{ const current=currentPhoto(state.eventData); if(current) await pinPhoto(current.id); });
      els.clearPinsBtn.addEventListener('click', clearPins);
    }

    async function boot(){ await ensureSeed(); await ensureUser(); buildSamples(); buildMapOptions(); buildStatusChips(); buildTemplateChips(); renderGoals(); setMode('sample'); bindEvents(); onValue(eventRef(), snap=>{ const data=snap.val() || {}; state.eventData=data; renderFlow(data); renderCurrent(data); renderForced(data); renderQueue(data); renderVote(data); renderPeople(data); }); if(state.timerInterval) clearInterval(state.timerInterval); state.timerInterval=setInterval(()=>{ if(state.eventData){ renderCurrent(state.eventData); autoAdvanceIfNeeded(); } },1000); }
    boot();
  </script>
</body>
</html>
